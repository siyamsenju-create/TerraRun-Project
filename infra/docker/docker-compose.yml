services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: terrarun-postgres
    environment:
      POSTGRES_USER: terrarun
      POSTGRES_PASSWORD: terrarun
      POSTGRES_DB: terrarun
    ports:
      - "5432:5432"
    volumes:
      - terrarun_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U terrarun -d terrarun"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: terrarun-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  terrarun_postgres:

